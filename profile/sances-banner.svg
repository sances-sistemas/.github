  <style>
    .icon { transform-box: fill-box; transform-origin: center; animation: spinIn 1s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes spinIn { from { opacity: 0; transform: rotate(-120deg) scale(0.6); } to { opacity: 1; transform: rotate(0deg) scale(1); } }
    .wipe { transform-box: fill-box; transform-origin: left center; animation: wipeIn 0.9s cubic-bezier(0.22,1,0.36,1) 0.45s both; }
    @keyframes wipeIn { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    .stripe { transform-box: fill-box; transform-origin: left center; animation: wipeIn 0.6s cubic-bezier(0.22,1,0.36,1) both; }
    .st1 { animation-delay: 1.05s; } .st2 { animation-delay: 1.2s; } .st3 { animation-delay: 1.35s; }
    .tagline { animation: fadeUp 0.8s ease-out 1.3s both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 0.92; transform: translateY(0); } }
    .ln { animation: race linear infinite; }
    .ln1 { animation-duration: 4.2s; animation-delay: -1.5s; }
    .ln2 { animation-duration: 6.5s; animation-delay: -4s; }
    .ln3 { animation-duration: 5.2s; animation-delay: -2.6s; }
    .ln4 { animation-duration: 7.5s; animation-delay: -0.8s; }
    .ln5 { animation-duration: 5.8s; animation-delay: -3.4s; }
    @keyframes race { from { transform: translateX(-320px); } to { transform: translateX(1600px); } }
    @media (prefers-reduced-motion: reduce) {
      .icon, .wipe, .stripe, .tagline, .ln { animation: none; }
      .tagline { opacity: 0.92; }
    }
  </style>

  

